app-id: com.github.elth0r0.stackandconquer
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: stackandconquer
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
modules:
  - name: stackandconquer
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: git
        url: https://github.com/ElTh0r0/stackandconquer.git
        tag: v0.11.1
        commit: 00f4f227e091f0730c2749951f4deb8cf47ec6bb
